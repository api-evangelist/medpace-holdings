specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Medpace Holdings
providerId: medpace-holdings
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Clinical Research
  - CRO
  - Biotech
description: Medpace Holdings is a full-service contract research organization (CRO) delivering Phase
  I-IV clinical trial services to pharmaceutical and biotech sponsors. Medpace does not operate a public
  developer program. Sponsor-facing systems (ClinTrak EDC, IRT, eTMF, central labs portals, imaging
  archives) are accessed under sponsor study contracts. Pricing is set per-study via Statement of Work
  (typically a mix of fixed-price service fees, pass-through costs, and per-subject / per-visit unit
  pricing) and is not published.
notes: |
  No public developer program or pricing. Set reconciled=true only if a public sponsor / partner API
  surface is published with rates.
sources:
  - https://www.medpace.com/
plans:
  - id: medpace-holdings-sponsor-contract
    name: Sponsor Study Contract
    type: enterprise
    description: Access to Medpace's sponsor / site systems (ClinTrak EDC, IRT, eTMF, central lab portals)
      is granted as part of a clinical trial Statement of Work. Pricing is per-study with a mix of fixed-
      price service fees, pass-through costs, and per-subject / per-visit unit prices.
    entries:
      - label: Study Service Fee
        description: Fixed-price service fee per protocol / phase, covering PM, monitoring, biostats,
          medical writing, and regulatory.
        name: study_service_fee
        type: tiered
        metric: study
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'per SOW'
        userMultiplied: false
      - label: Per-Subject / Per-Visit
        description: Variable component priced per enrolled subject and per protocol-defined visit.
        name: per_subject_visit
        type: metered
        metric: visit
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'per SOW'
        userMultiplied: false
      - label: Pass-Through Costs
        description: Investigator grants, central labs, IRB / EC fees, courier, imaging, and other
          third-party costs passed through at cost (or with administrative markup).
        name: pass_through
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'pass-through'
        userMultiplied: false
    elements:
      - name: ClinTrak EDC / Clinical Data Management
      - name: IRT / Randomization
      - name: eTMF / Document Management
      - name: Central Laboratory Services
      - name: Bioanalytical Laboratory
      - name: Imaging Core Lab
      - name: Regulatory & Medical Affairs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
