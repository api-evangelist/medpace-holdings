specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Medpace Holdings
providerId: medpace-holdings
publisherName: Medpace Holdings, Inc.
serviceCategory: Contract Research Organization (CRO)
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Clinical Research
  - CRO
  - Biotech
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Medpace Holdings: clinical trial services priced per study
  via SOW with fixed-price service fees, per-subject / per-visit unit pricing, and pass-through costs.
  FinOps focus is study-level financial management rather than per-API-call billing.'
notes: |
  No public per-API pricing. Cost is allocated per study / protocol; meters represent clinical-trial
  economic units (subjects enrolled, visits, sites, deliverable milestones).
sources:
  - https://www.medpace.com/
principles:
  - name: Visibility
    description: Track study burn against budget via the SOW and PM dashboard; reconcile invoices to
      enrollment milestones (first patient in, last patient last visit) and pass-through receipts.
  - name: Allocation
    description: Allocate by study / protocol / phase / therapeutic area. For sponsors with multi-study
      portfolios, allocate to clinical program and indication, and break out pass-through (investigator
      grants, central labs, courier) from service fees.
  - name: Optimization
    description: Optimize protocol design (visit count, complexity), select sites by historical enrollment
      and quality data, and choose appropriate Medpace service modules (full-service vs functional service
      provision) per study.
  - name: Accountability
    description: Assign a sponsor study lead per protocol who reviews monthly burn, change orders, and
      milestone delivery with the Medpace project manager.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Per-Study SOW (Fixed + Per-Subject + Pass-Through)
  billingFrequency: Per-Milestone / Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Medpace Clinical Trial Services
  ServiceCategory: Contract Research Organization (CRO)
  ProviderName: Medpace
  PublisherName: Medpace Holdings, Inc.
  InvoiceIssuerName: Medpace Holdings, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: study_service_fee
    description: Fixed-price service fee per study, recognized against milestones.
    unit: study-milestone
    aggregation: sum
    dimensions:
      - study
      - phase
      - therapeutic_area
  - name: subjects_enrolled
    description: Subjects enrolled / randomized in the study.
    unit: subject
    aggregation: sum
    dimensions:
      - study
      - site
      - country
  - name: subject_visits
    description: Protocol-defined visits completed.
    unit: visit
    aggregation: sum
    dimensions:
      - study
      - visit_type
      - site
  - name: pass_through_costs
    description: Pass-through costs (investigator grants, central labs, IRB / EC, courier).
    unit: USD
    aggregation: sum
    dimensions:
      - study
      - cost_type
      - vendor
  - name: change_orders
    description: Approved change orders amending the SOW.
    unit: USD
    aggregation: sum
    dimensions:
      - study
      - reason_code
apis:
  - name: Medpace Holdings API
    baseURL: https://api.medpace.com
    tags:
      - Clinical Research
      - CRO
      - Biotech
    serviceName: Medpace Holdings API
    serviceCategory: API
unitEconomics:
  - name: Cost per Enrolled Subject
    metric: billed_cost / subjects_enrolled
    target: TBD
  - name: Cost per Visit
    metric: billed_cost / subject_visits
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
